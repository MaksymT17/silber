name: Release build Linux & Windows & MacOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (optional, overrides selected branch/tag)'
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install packages
      run: sudo apt -y install git g++ cmake

    - name: Checkout silber repo
      uses: actions/checkout@v3
      with:
        repository: MaksymT17/silber
        ref: ${{ github.head_ref }}  # Use the head reference of the pull request
        path: silber

    - name: Build artifacts with Cmake
      run: |
        cd silber &&
        mkdir -p build &&
        cd build &&
        cmake -DCMAKE_BUILD_TYPE=Release .. &&
        make

    - name: Copy headers and library
      run: |
        cd silber &&
        mkdir -p build/linux_release/lib &&
        mkdir -p build/linux_release/include &&
        cp -r *.h build/linux_release/include &&
        cp build/libsilber-2.0.a build/linux_release/lib

    - name: Upload Linux(Ubuntu)build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux_release
        path: silber/build/linux_release



  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout aquamarine repo
        uses: actions/checkout@v3
        with:
          repository: MaksymT17/silber
          ref: ${{ github.head_ref }}  # Use the head reference of the pull request
          path: silber

      - name: Build artifacts with Cmake
        run: |
          cd silber &&
          echo "removing existing build folder..."
          rm -rf build/ &&
          mkdir build &&
          echo "preparing new build with cmake..." &&
          cd build/ &&
          cmake .. &&
          cmake --build . --config Release
        shell: bash

      - name: Copy headers and library
        run: |
          cd silber
          mkdir -p build/windows_release/lib &&
          mkdir -p build/windows_release/include &&
          cp -r *.h build/windows_release/include &&
          cp build/Release/silber-2.0.lib build/windows_release/lib
        shell: bash

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_release
          path: silber/build/windows_release



  build-macos:
    runs-on: macos-latest

    steps:

    - name: Install dependencies
      run: |
        brew install git gcc cmake 

    - name: Checkout silber repo
      uses: actions/checkout@v3
      with:
        repository: MaksymT17/silber
        ref: ${{ github.head_ref }}  # Use the head reference of the pull request
        path: silber

    - name: Build artifacts with Cmake
      run: |
        cd silber &&
        mkdir -p build &&
        cd build &&
        cmake -DCMAKE_BUILD_TYPE=Release .. &&
        make

    - name: Copy headers and library
      run: |
        cd silber &&
        mkdir -p build/macos_release/lib &&
        mkdir -p build/macos_release/include &&
        cp -r *.h build/macos_release/include &&
        cp build/libsilber-2.0.a build/macos_release/lib
  
    - name: Upload MacOS build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos_release
        path: silber/build/macos_release

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux_release
          path: linux_release

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows_release
          path: windows_release

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos_release
          path: macos_release

      - name: Package Artifacts into Zips
        run: |
          zip -r silber-linux.zip linux_release
          zip -r silber-windows.zip windows_release
          zip -r silber-macos.zip macos_release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            silber-linux.zip
            silber-windows.zip
            silber-macos.zip
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}